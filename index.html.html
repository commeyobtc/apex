<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Management System v3.0</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────
   ROOT & RESET
───────────────────────────────────────────── */
:root {
  --bg:          #080A0F;
  --bg-2:        #0D1018;
  --bg-card:     #111520;
  --bg-card2:    #161B28;
  --sidebar:     #090C13;
  --border:      #1C2235;
  --border2:     #242D42;
  --accent:      #00FFB2;
  --accent-dim:  #00CC8E;
  --blue:        #2979FF;
  --blue-dim:    #1A56E8;
  --amber:       #FFB300;
  --red:         #FF3D5A;
  --green:       #00E676;
  --purple:      #C77DFF;
  --teal:        #00BCD4;
  --text-1:      #E8EDF8;
  --text-2:      #7B8BAD;
  --text-3:      #3D4A66;
  --glow-accent: 0 0 20px rgba(0,255,178,0.25);
  --glow-blue:   0 0 20px rgba(41,121,255,0.25);
  --glow-red:    0 0 20px rgba(255,61,90,0.2);
  --font-display:'Syne', sans-serif;
  --font-mono:   'IBM Plex Mono', monospace;
  --sidebar-w:   224px;
  --topbar-h:    56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text-1);font-family:var(--font-mono);font-size:13px;line-height:1.6;overflow:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-3);}

/* ─────────────────────────────────────────────
   SCREENS
───────────────────────────────────────────── */
.screen{display:none;width:100%;height:100%;}
.screen.active{display:flex;}

/* ─────────────────────────────────────────────
   LOGIN SCREEN
───────────────────────────────────────────── */
#screen-login{align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.35;animation:gridDrift 20s linear infinite;}
@keyframes gridDrift{from{background-position:0 0;}to{background-position:48px 48px;}}
.login-glow{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(0,255,178,.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.login-card{position:relative;z-index:2;width:460px;background:var(--bg-card);border:1px solid var(--border2);animation:cardIn .5s cubic-bezier(.16,1,.3,1);box-shadow:0 32px 80px rgba(0,0,0,.7),var(--glow-accent);}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97);}}
.login-card-top{background:linear-gradient(135deg,rgba(0,255,178,.08),transparent);border-bottom:1px solid var(--border2);padding:32px 40px 24px;text-align:center;}
.login-logo{width:64px;height:64px;margin:0 auto 14px;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px;animation:logoPulse 3s ease-in-out infinite;position:relative;}
.login-logo::before{content:'';position:absolute;inset:-6px;border:1px solid rgba(0,255,178,.2);animation:logoPulse 3s ease-in-out infinite reverse;}
@keyframes logoPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,178,.3);}50%{box-shadow:0 0 20px 6px rgba(0,255,178,.15);}}
.login-title{font-family:var(--font-display);font-size:19px;font-weight:800;letter-spacing:.1em;color:var(--text-1);}
.login-sub{color:var(--text-2);font-size:11px;margin-top:4px;letter-spacing:.05em;}
.login-body{padding:26px 40px 32px;}
.tab-row{display:flex;border:1px solid var(--border2);margin-bottom:22px;overflow:hidden;}
.tab-btn{flex:1;padding:8px;background:transparent;border:none;cursor:pointer;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--text-2);transition:all .2s;}
.tab-btn.active{background:var(--accent);color:var(--bg);}
.tab-btn:not(.active):hover{background:var(--border);color:var(--text-1);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* ─────────────────────────────────────────────
   FORM ELEMENTS
───────────────────────────────────────────── */
.field{margin-bottom:15px;}
.field label{display:block;font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text-2);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:10px 14px;background:var(--bg-2);border:1px solid var(--border2);color:var(--text-1);font-family:var(--font-mono);font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
.field select{cursor:pointer;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,178,.08);}
.field textarea{resize:vertical;min-height:80px;}
.field .hint{font-size:10px;color:var(--text-3);margin-top:4px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ─────────────────────────────────────────────
   BUTTONS
───────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.08em;border:1px solid;cursor:pointer;transition:all .18s;white-space:nowrap;text-decoration:none;}
.btn-accent{background:transparent;border-color:var(--accent);color:var(--accent);}
.btn-accent:hover{background:var(--accent);color:var(--bg);box-shadow:var(--glow-accent);}
.btn-blue{background:transparent;border-color:var(--blue);color:var(--blue);}
.btn-blue:hover{background:var(--blue);color:#fff;box-shadow:var(--glow-blue);}
.btn-red{background:transparent;border-color:var(--red);color:var(--red);}
.btn-red:hover{background:var(--red);color:#fff;box-shadow:var(--glow-red);}
.btn-amber{background:transparent;border-color:var(--amber);color:var(--amber);}
.btn-amber:hover{background:var(--amber);color:var(--bg);}
.btn-green{background:transparent;border-color:var(--green);color:var(--green);}
.btn-green:hover{background:var(--green);color:var(--bg);}
.btn-purple{background:transparent;border-color:var(--purple);color:var(--purple);}
.btn-purple:hover{background:var(--purple);color:var(--bg);}
.btn-teal{background:transparent;border-color:var(--teal);color:var(--teal);}
.btn-teal:hover{background:var(--teal);color:var(--bg);}
.btn-ghost{background:transparent;border-color:var(--border2);color:var(--text-2);}
.btn-ghost:hover{border-color:var(--text-2);color:var(--text-1);}
.btn-solid-accent{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:700;}
.btn-solid-accent:hover{background:var(--accent-dim);box-shadow:var(--glow-accent);}
.btn-full{width:100%;justify-content:center;padding:12px;}
.btn-sm{padding:5px 10px;font-size:10px;}
.btn-icon{padding:7px 10px;}

.login-hint{margin-top:14px;padding:10px 14px;background:rgba(0,255,178,.04);border:1px solid rgba(0,255,178,.15);font-size:11px;color:var(--text-2);text-align:center;}
.login-hint span{color:var(--accent);}
.error-msg{padding:10px 14px;margin-bottom:14px;background:rgba(255,61,90,.08);border:1px solid rgba(255,61,90,.3);color:var(--red);font-size:11px;display:none;}
.error-msg.show{display:block;}

/* ─────────────────────────────────────────────
   APP LAYOUT
───────────────────────────────────────────── */
#screen-app{flex-direction:column;}
.topbar{height:var(--topbar-h);background:var(--sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:100;}
.topbar-logo{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--accent);letter-spacing:.08em;display:flex;align-items:center;gap:8px;}
.topbar-logo::before{content:'◈';font-size:18px;}
.topbar-sep{flex:1;}
.topbar-user{display:flex;align-items:center;gap:10px;}
.topbar-name{color:var(--text-1);font-size:12px;}
.role-badge{padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--bg);}
.app-body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:12px 0;}
.nav-section-label{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--text-3);padding:12px 18px 6px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;color:var(--text-2);font-size:12px;transition:all .15s;border-left:2px solid transparent;position:relative;}
.nav-item:hover{color:var(--text-1);background:rgba(255,255,255,.03);}
.nav-item.active{color:var(--accent);background:rgba(0,255,178,.06);border-left-color:var(--accent);}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.nav-label{font-weight:500;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;padding:1px 6px;border-radius:0;font-weight:700;}
.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border);font-size:10px;color:var(--text-3);}
.main{flex:1;overflow-y:auto;padding:28px 32px;}
.panel{display:none;animation:panelIn .3s ease;}
.panel.active{display:block;}
@keyframes panelIn{from{opacity:0;transform:translateY(8px);}}

/* ─────────────────────────────────────────────
   PAGE ELEMENTS
───────────────────────────────────────────── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;}
.page-title{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--text-1);}
.page-sub{color:var(--text-2);font-size:11px;margin-top:2px;}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.divider{height:1px;background:var(--border);margin:20px 0;}

/* ─────────────────────────────────────────────
   STAT CARDS
───────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--bg-card);border:1px solid var(--border);padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;cursor:default;}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.stat-card.c-accent::after{background:var(--accent);}
.stat-card.c-blue::after{background:var(--blue);}
.stat-card.c-amber::after{background:var(--amber);}
.stat-card.c-green::after{background:var(--green);}
.stat-card.c-red::after{background:var(--red);}
.stat-card.c-purple::after{background:var(--purple);}
.stat-card.c-teal::after{background:var(--teal);}
.stat-icon{font-size:22px;margin-bottom:8px;}
.stat-value{font-family:var(--font-display);font-size:32px;font-weight:800;line-height:1;}
.stat-label{font-size:10px;color:var(--text-2);letter-spacing:.06em;margin-top:4px;text-transform:uppercase;}
.stat-card.c-accent .stat-value{color:var(--accent);}
.stat-card.c-blue .stat-value{color:var(--blue);}
.stat-card.c-amber .stat-value{color:var(--amber);}
.stat-card.c-green .stat-value{color:var(--green);}
.stat-card.c-red .stat-value{color:var(--red);}
.stat-card.c-purple .stat-value{color:var(--purple);}
.stat-card.c-teal .stat-value{color:var(--teal);}

/* ─────────────────────────────────────────────
   CARDS & LAYOUT
───────────────────────────────────────────── */
.card{background:var(--bg-card);border:1px solid var(--border);padding:20px 24px;margin-bottom:18px;}
.card-title{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--text-1);margin-bottom:4px;}
.card-sub{font-size:10px;color:var(--text-2);margin-bottom:16px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}

/* ─────────────────────────────────────────────
   TABLES
───────────────────────────────────────────── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-2);border-bottom:1px solid var(--border);background:var(--bg-2);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s;}
tbody tr:hover{background:rgba(255,255,255,.025);}
tbody td{padding:10px 14px;color:var(--text-1);vertical-align:middle;}
.td-muted{color:var(--text-2)!important;}
.td-mono{font-family:var(--font-mono);font-size:11px;}

/* ─────────────────────────────────────────────
   SEARCH & BADGES
───────────────────────────────────────────── */
.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.search-input{flex:1;max-width:340px;padding:8px 14px;background:var(--bg-2);border:1px solid var(--border2);color:var(--text-1);font-family:var(--font-mono);font-size:12px;outline:none;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--text-3);}
.badge{display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.06em;border:1px solid currentColor;}
.badge-active{color:var(--green);}
.badge-inactive{color:var(--text-3);}
.badge-used{color:var(--text-3);}
.badge-fresh{color:var(--accent);}
.badge-pending{color:var(--amber);}
.badge-fulfilled{color:var(--green);}
.badge-rejected{color:var(--red);}
.badge-unlimited{color:var(--purple);}

/* ─────────────────────────────────────────────
   TOKEN BOX
───────────────────────────────────────────── */
.token-box{background:var(--bg-2);border:1px solid var(--accent);padding:10px 14px;font-family:var(--font-mono);font-size:12px;color:var(--accent);word-break:break-all;letter-spacing:.04em;margin:10px 0;cursor:pointer;transition:background .2s;position:relative;}
.token-box:hover{background:rgba(0,255,178,.06);}
.token-box .copy-hint{font-size:9px;color:var(--text-3);display:block;margin-top:4px;}

/* ─────────────────────────────────────────────
   AVATAR
───────────────────────────────────────────── */
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--bg);flex-shrink:0;}
.avatar-lg{width:80px;height:80px;font-size:28px;border-radius:50%;}

/* ─────────────────────────────────────────────
   MODAL
───────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg-card);border:1px solid var(--border2);width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:modalIn .25s cubic-bezier(.16,1,.3,1);box-shadow:0 40px 100px rgba(0,0,0,.8);}
.modal-wide{width:700px;}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(16px);}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 18px;border-bottom:1px solid var(--border);}
.modal-title{font-family:var(--font-display);font-size:15px;font-weight:800;}
.modal-close{background:none;border:none;color:var(--text-2);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;}
.modal-close:hover{color:var(--text-1);}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}

/* ─────────────────────────────────────────────
   TOAST
───────────────────────────────────────────── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 18px;min-width:260px;background:var(--bg-card);border:1px solid var(--border2);font-size:12px;color:var(--text-1);animation:toastIn .3s ease;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}}
.toast.success{border-color:var(--green);}
.toast.error{border-color:var(--red);}
.toast.info{border-color:var(--accent);}
.toast.warn{border-color:var(--amber);}
.toast-icon{font-size:16px;}
.toast.success .toast-icon{color:var(--green);}
.toast.error   .toast-icon{color:var(--red);}
.toast.info    .toast-icon{color:var(--accent);}
.toast.warn    .toast-icon{color:var(--amber);}

/* ─────────────────────────────────────────────
   LOG / ACTIVITY
───────────────────────────────────────────── */
.log-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.log-time{font-size:10px;color:var(--text-3);flex-shrink:0;width:140px;}
.log-who{color:var(--text-2);font-size:11px;min-width:130px;}
.log-action{font-weight:600;font-size:11px;}
.log-detail{font-size:11px;color:var(--text-2);flex:1;}

/* ─────────────────────────────────────────────
   PERM CHIPS
───────────────────────────────────────────── */
.perm-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:rgba(0,255,178,.06);border:1px solid rgba(0,255,178,.2);color:var(--accent);font-size:10px;margin:3px;}

/* ─────────────────────────────────────────────
   PROFILE
───────────────────────────────────────────── */
.profile-hero{background:var(--bg-card);border:1px solid var(--border);padding:32px;display:flex;gap:24px;align-items:center;margin-bottom:20px;}
.profile-info h2{font-family:var(--font-display);font-size:22px;font-weight:800;}
.profile-info p{color:var(--text-2);font-size:12px;margin-top:4px;}

/* ─────────────────────────────────────────────
   REQUESTS
───────────────────────────────────────────── */
.req-card{background:var(--bg-card2);border:1px solid var(--border);padding:16px 20px;margin-bottom:12px;transition:border-color .2s;}
.req-card:hover{border-color:var(--border2);}
.req-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:12px;}
.req-title{font-weight:700;font-size:13px;color:var(--text-1);}
.req-meta{font-size:10px;color:var(--text-3);margin-top:2px;}
.req-body{font-size:12px;color:var(--text-2);line-height:1.7;margin-bottom:12px;}
.req-actions{display:flex;gap:8px;flex-wrap:wrap;}
.req-response{margin-top:10px;padding:10px 14px;background:rgba(0,255,178,.04);border:1px solid rgba(0,255,178,.15);font-size:11px;color:var(--text-2);}
.req-tabs{display:flex;gap:0;border:1px solid var(--border2);margin-bottom:20px;overflow:hidden;width:fit-content;}
.req-tab{padding:8px 20px;background:transparent;border:none;cursor:pointer;font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--text-2);transition:all .2s;letter-spacing:.06em;}
.req-tab.active{background:var(--accent);color:var(--bg);}
.req-tab:not(.active):hover{background:var(--border);color:var(--text-1);}

/* ─────────────────────────────────────────────
   SPREADSHEET BUILDER
───────────────────────────────────────────── */
.sheet-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px 14px;background:var(--bg-2);border:1px solid var(--border);margin-bottom:0;border-bottom:none;}
.sheet-name-input{background:var(--bg);border:1px solid var(--border2);color:var(--accent);font-family:var(--font-display);font-size:14px;font-weight:700;padding:4px 10px;outline:none;width:200px;}
.sheet-name-input:focus{border-color:var(--accent);}
.sheet-sep{width:1px;height:24px;background:var(--border2);flex-shrink:0;}
.sheet-wrap{overflow:auto;border:1px solid var(--border);max-height:480px;}
.sheet-table{border-collapse:collapse;font-family:var(--font-mono);font-size:12px;min-width:100%;}
.sheet-table .row-num{background:var(--bg-2);color:var(--text-3);font-size:10px;padding:0;width:36px;min-width:36px;text-align:center;border:1px solid var(--border);border-right:1px solid var(--border2);user-select:none;cursor:default;}
.sheet-table .col-header{background:var(--bg-2);color:var(--text-2);font-size:10px;font-weight:700;padding:6px 8px;border:1px solid var(--border);text-align:center;user-select:none;min-width:100px;white-space:nowrap;}
.sheet-table td.cell{padding:0;border:1px solid var(--border);position:relative;min-width:100px;}
.sheet-table td.cell input{width:100%;height:100%;padding:6px 8px;background:transparent;border:none;outline:none;color:var(--text-1);font-family:var(--font-mono);font-size:12px;}
.sheet-table td.cell:focus-within{background:rgba(0,255,178,.04);border-color:var(--accent);}
.sheet-table td.cell input.formula{color:var(--accent);}
.sheets-list{display:flex;gap:0;border-top:1px solid var(--border2);overflow-x:auto;}
.sheet-tab-btn{padding:7px 18px;background:var(--bg-2);border:none;border-right:1px solid var(--border);color:var(--text-2);font-family:var(--font-mono);font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap;}

<script>
// ═══════════════════════════════════════════════════════════════
// DB ENGINE
// ═══════════════════════════════════════════════════════════════
const DB = (() => {
  const read = (k) => { try { return JSON.parse(localStorage.getItem(k)) || null; } catch { return null; } };
  const write = (k, v) => localStorage.setItem(k, JSON.stringify(v));

  const ROLES_DEF = {
    admin:       ['manage_users','send_invites','unlimited_tokens','view_all','edit_all','delete_all','send_whatsapp','manage_roles','view_logs','fulfill_requests','create_requests','create_spreadsheet'],
    manager:     ['add_users','send_invites','view_all','edit_basic','send_whatsapp','view_logs','fulfill_requests','create_requests','create_spreadsheet'],
    supervisor:  ['view_team','edit_basic','send_whatsapp_limited','view_logs','fulfill_requests','create_requests','create_spreadsheet'],
    sysadmin:    ['view_all','view_logs','create_requests','create_spreadsheet'],
    employee:    ['view_own','send_whatsapp_limited','create_requests','create_spreadsheet'],
    viewer:      ['view_own','create_spreadsheet'],
  };

  const ROLE_COLORS = {
    admin:'#FF6B35', manager:'#A855F7', supervisor:'#38BDF8',
    sysadmin:'#00BCD4', employee:'#34D399', viewer:'#94A3B8'
  };

  function hash(str) { let h=0; for(let i=0;i<str.length;i++) h=Math.imul(31,h)+str.charCodeAt(i)|0; return Math.abs(h).toString(16).padStart(8,'0')+str.length.toString(16); }
  function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

  function init() {
    if (read('db_init_v3')) return;
    write('users', [{
      id:'admin_1', username:'admin', password:hash('Admin@1234'),
      fullName:'System Administrator', role:'admin',
      phone:'', whatsapp:'', isActive:true,
      createdBy:null, createdAt:new Date().toISOString(), inviteToken:null
    }]);
    write('invites', []);
    write('activity_log', []);
    write('whatsapp_msgs', []);
    write('requests', []);
    write('spreadsheets', []);
    write('db_init_v3', true);
  }

  function getUsers() { return read('users') || []; }
  function saveUsers(u) { write('users', u); }
  function getUserById(id) { return getUsers().find(u => u.id === id) || null; }
  function getUserByUsername(un) { return getUsers().find(u => u.username === un) || null; }

  function login(username, password) {
    const u = getUsers().find(u => u.username===username && u.password===hash(password));
    if (!u) return null;
    if (!u.isActive) return { error:'disabled' };
    log(u.id, 'LOGIN', `${username} logged in`);
    return u;
  }

  function createUser(data, createdBy) {
    const users = getUsers();
    if (users.find(u => u.username===data.username)) return null;
    const user = { id:uid(), username:data.username, password:hash(data.password), fullName:data.fullName, role:data.role, phone:data.phone||'', whatsapp:data.whatsapp||'', isActive:true, createdBy, createdAt:new Date().toISOString(), inviteToken:uid() };
    users.push(user); saveUsers(users);
    log(createdBy, 'CREATE_USER', `Created ${data.username} (${data.role})`);
    return user;
  }

  function updateUserRole(userId, newRole, changedBy) {
    const users = getUsers(); const u = users.find(u=>u.id===userId);
    if (u) { u.role=newRole; saveUsers(users); log(changedBy, 'CHANGE_ROLE', `${u.username} → ${newRole}`); }
  }

  function toggleActive(userId, changedBy) {
    const users = getUsers(); const u = users.find(u=>u.id===userId);
    if (u) { u.isActive=!u.isActive; saveUsers(users); log(changedBy, u.isActive?'ACTIVATE_USER':'DEACTIVATE_USER', u.username); }
    return u?.isActive;
  }

  function deleteUser(userId, deletedBy) {
    const users = getUsers().filter(u=>u.id!==userId||u.role==='admin');
    saveUsers(users); log(deletedBy, 'DELETE_USER', `id=${userId}`);
  }

  function changePassword(userId, oldPwd, newPwd) {
    const users=getUsers(); const u=users.find(u=>u.id===userId);
    if(!u||u.password!==hash(oldPwd)) return false;
    u.password=hash(newPwd); saveUsers(users);
    log(userId,'CHANGE_PASSWORD','Password changed'); return true;
  }

  // INVITE — admin: unlimited, others: limited
  function generateInvite(role, createdBy, count=1) {
    const tokens = [];
    const invites = read('invites') || [];
    for (let i=0; i<count; i++) {
      const token = uid()+uid()+uid();
      invites.unshift({ id:uid(), token, role, createdBy, used:false, createdAt:new Date().toISOString() });
      tokens.push(token);
    }
    write('invites', invites);
    log(createdBy, 'GENERATE_INVITE', `role=${role} count=${count}`);
    return tokens;
  }

  function getInvites(createdBy=null) {
    const invs = read('invites')||[];
    const users = getUsers();
    return (createdBy ? invs.filter(i=>i.createdBy===createdBy):invs)
      .map(i=>({...i, creatorName:users.find(u=>u.id===i.createdBy)?.fullName||'—'}));
  }

  function deleteInvite(id) {
    const invites = (read('invites')||[]).filter(i=>i.id!==id);
    write('invites', invites);
  }

  function useInvite(token, userData) {
    const invites=read('invites')||[];
    const inv=invites.find(i=>i.token===token&&!i.used);
    if(!inv) return null;
    const user=createUser({...userData, role:inv.role}, inv.createdBy);
    if(!user) return null;
    inv.used=true; write('invites', invites); return user;
  }

  // REQUESTS
  function getRequests(filter=null) {
    const reqs = read('requests')||[];
    const users = getUsers();
    let list = reqs.map(r=>({...r, requesterName:users.find(u=>u.id===r.requesterId)?.fullName||'—', fulfillerName:r.fulfillerId?(users.find(u=>u.id===r.fulfillerId)?.fullName||'—'):null }));
    if (filter==='own') list=list.filter(r=>r.requesterId===SESSION?.id);
    else if (filter==='pending') list=list.filter(r=>r.status==='pending');
    return list;
  }

  function createRequest(data, userId) {
    const reqs = read('requests')||[];
    const req = { id:uid(), requesterId:userId, title:data.title, description:data.description, priority:data.priority||'normal', category:data.category||'general', status:'pending', response:'', fulfillerId:null, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
    reqs.unshift(req); write('requests', reqs);
    log(userId, 'CREATE_REQUEST', data.title); return req;
  }

  function fulfillRequest(reqId, response, status, fulfillerId) {
    const reqs = read('requests')||[];
    const r = reqs.find(r=>r.id===reqId);
    if (r) { r.status=status; r.response=response; r.fulfillerId=fulfillerId; r.updatedAt=new Date().toISOString(); write('requests', reqs); log(fulfillerId, 'FULFILL_REQUEST', `id=${reqId} status=${status}`); }
  }

  // SPREADSHEETS
  function getSpreadsheets(userId=null) {
    const sheets = read('spreadsheets')||[];
    return userId ? sheets.filter(s=>s.ownerId===userId||s.shared) : sheets;
  }

  function saveSpreadsheet(sheet) {
    const sheets = read('spreadsheets')||[];
    const idx = sheets.findIndex(s=>s.id===sheet.id);
    if (idx>=0) sheets[idx]=sheet; else sheets.unshift(sheet);
    write('spreadsheets', sheets);
    log(sheet.ownerId, 'SAVE_SPREADSHEET', sheet.name); return sheet;
  }

  function deleteSpreadsheet(id, userId) {
    const sheets = (read('spreadsheets')||[]).filter(s=>s.id!==id);
    write('spreadsheets', sheets); log(userId, 'DELETE_SPREADSHEET', `id=${id}`);
  }

  function log(userId, action, details='') {
    const logs=read('activity_log')||[];
    logs.unshift({id:uid(),userId,action,details,timestamp:new Date().toISOString()});
    if(logs.length>500) logs.length=500;
    write('activity_log', logs);
  }

  function getLogs(limit=100) {
    const users=getUsers();
    return (read('activity_log')||[]).slice(0,limit).map(l=>({...l, userName:users.find(u=>u.id===l.userId)?.fullName||'System'}));
  }

  function saveMessage(senderId,recipient,message) {
    const msgs=read('whatsapp_msgs')||[];
    msgs.unshift({id:uid(),senderId,recipient,message,status:'sent',sentAt:new Date().toISOString()});
    write('whatsapp_msgs',msgs); log(senderId,'WHATSAPP_SENT',`To:${recipient}`);
  }

  function getMessages(userId=null) {
    const users=getUsers(); const msgs=read('whatsapp_msgs')||[];
    return (userId?msgs.filter(m=>m.senderId===userId):msgs).map(m=>({...m, senderName:users.find(u=>u.id===m.senderId)?.fullName||'—'}));
  }

  function getPerms(role) { return ROLES_DEF[role]||[]; }
  function hasPerm(role,perm) { return getPerms(role).includes(perm); }
  function getRoleColor(role) { return ROLE_COLORS[role]||'#94A3B8'; }
  function getAllRoles() { return ROLES_DEF; }
  function getPendingRequestCount() { return (read('requests')||[]).filter(r=>r.status==='pending').length; }

  return { init,login,createUser,updateUserRole,toggleActive,deleteUser,changePassword,
    generateInvite,getInvites,deleteInvite,useInvite,
    getUsers,getUserById,getUserByUsername,
    getRequests,createRequest,fulfillRequest,
    getSpreadsheets,saveSpreadsheet,deleteSpreadsheet,
    saveMessage,getMessages,getLogs,log,
    getPerms,hasPerm,getRoleColor,getAllRoles,getPendingRequestCount };
})();

DB.init();

// ═══════════════════════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════════════════════
let SESSION = null;
function setSession(u){ SESSION=u; sessionStorage.setItem('session_id',u.id); }
function clearSession(){ SESSION=null; sessionStorage.removeItem('session_id'); }
(function(){ const id=sessionStorage.getItem('session_id'); if(id){ const u=DB.getUserById(id); if(u&&u.isActive) SESSION=u; else sessionStorage.removeItem('session_id'); } })();

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
function toast(msg,type='info',dur=3500){
  const icons={success:'✓',error:'✕',info:'◈',warn:'⚠'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span class="toast-icon">${icons[type]||'◈'}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(20px)'; el.style.transition='.3s'; setTimeout(()=>el.remove(),300); },dur);
}

// ═══════════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════════
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function showPanel(key){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const panel=document.getElementById(`panel-${key}`);
  const nav=document.querySelector(`[data-panel="${key}"]`);
  if(panel){ panel.classList.add('active'); renderPanel(key); }
  if(nav) nav.classList.add('active');
}

window.addEventListener('DOMContentLoaded',()=>{ if(SESSION) bootApp(); else showScreen('screen-login'); bindLoginEvents(); });

function bootApp(){ buildSidebar(); buildTopbar(); showScreen('screen-app'); showPanel('home'); }

// ═══════════════════════════════════════════════════════════════
// TOPBAR & SIDEBAR
// ═══════════════════════════════════════════════════════════════
function buildTopbar(){
  const rc=DB.getRoleColor(SESSION.role);
  document.getElementById('topbar-name').textContent=SESSION.fullName;
  const badge=document.getElementById('topbar-badge');
  badge.textContent=SESSION.role.toUpperCase(); badge.style.background=rc;
}

const NAV_ALL=[
  { key:'home',        icon:'⊞', label:'Dashboard',    perms:[] },
  { key:'users',       icon:'◉', label:'Users',         perms:['view_all','view_team'] },
  { key:'invites',     icon:'⊕', label:'Invite Tokens', perms:['send_invites'] },
  { key:'requests',    icon:'◫', label:'Requests',      perms:['create_requests','fulfill_requests'] },
  { key:'spreadsheet', icon:'⊟', label:'Spreadsheet',   perms:['create_spreadsheet'] },
  { key:'whatsapp',    icon:'◈', label:'WhatsApp',      perms:['send_whatsapp','send_whatsapp_limited'] },
  { key:'roles',       icon:'⊛', label:'Roles',         perms:['manage_roles','view_all'] },
  { key:'logs',        icon:'≡', label:'Activity Log',  perms:['view_logs'] },
  { key:'profile',     icon:'◯', label:'My Profile',    perms:[] },
];

function buildSidebar(){
  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML='';
  const perms=DB.getPerms(SESSION.role);
  NAV_ALL.forEach(item=>{
    const ok=item.perms.length===0||item.perms.some(p=>perms.includes(p));
    if(!ok) return;
    const el=document.createElement('div');
    el.className='nav-item'; el.dataset.panel=item.key;
    el.innerHTML=`<span class="nav-icon">${item.icon}</span><span class="nav-label">${item.label}</span>`;
    if(item.key==='requests'){ const cnt=DB.getPendingRequestCount(); if(cnt&&perms.includes('fulfill_requests')) el.innerHTML+=`<span class="nav-badge">${cnt}</span>`; }
    el.addEventListener('click',()=>showPanel(item.key));
    nav.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════════
// PANEL RENDERER
// ═══════════════════════════════════════════════════════════════
function renderPanel(key){
  const fns={home:renderHome,users:renderUsers,invites:renderInvites,requests:renderRequests,spreadsheet:renderSpreadsheet,whatsapp:renderWhatsApp,roles:renderRoles,logs:renderLogs,profile:renderProfile};
  if(fns[key]) fns[key]();
}

// ═══════════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════════
function renderHome(){
  const users=DB.getUsers(); const active=users.filter(u=>u.isActive).length;
  const invites=DB.getInvites(); const usedInv=invites.filter(i=>i.used).length;
  const reqs=DB.getRequests(); const pending=reqs.filter(r=>r.status==='pending').length;
  const sheets=DB.getSpreadsheets(SESSION.id);
  const logs=DB.getLogs(5);
  const perms=DB.getPerms(SESSION.role);
  const isAdmin=SESSION.role==='admin';
  const canFulfill=perms.includes('fulfill_requests');

  document.getElementById('panel-home').innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Dashboard Overview</div>
        <div class="page-sub">${new Date().toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div>
    </div>
    <div class="stats-grid">
      ${statCard('◉',users.length,'Total Users','c-accent')}
      ${statCard('✓',active,'Active','c-green')}
      ${statCard('⊕',invites.length,'Tokens Issued','c-blue')}
      ${isAdmin?statCard('∞','∞','Unlimited Tokens','c-purple'):''}
      ${statCard('◫',pending,'Pending Requests','c-amber')}
      ${statCard('⊟',sheets.length,'My Spreadsheets','c-teal')}
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Recent Users</div>
        <div class="card-sub">Latest registered members</div>
        ${users.slice(0,5).map(u=>`
          <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">
            <div class="avatar" style="background:${DB.getRoleColor(u.role)}">${initials(u.fullName)}</div>
            <div style="flex:1"><div style="font-size:12px;font-weight:600">${u.fullName}</div><div style="font-size:10px;color:var(--text-2)">@${u.username}</div></div>
            <span class="role-badge" style="background:${DB.getRoleColor(u.role)}">${u.role.toUpperCase()}</span>
            <span class="badge ${u.isActive?'badge-active':'badge-inactive'}">${u.isActive?'ON':'OFF'}</span>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">${canFulfill?'Pending Requests':'Recent Activity'}</div>
        <div class="card-sub">${canFulfill?`${pending} awaiting fulfillment`:'Last 5 system events'}</div>
        ${canFulfill && pending>0 ? DB.getRequests('pending').slice(0,4).map(r=>`
          <div style="padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <span style="font-size:12px;font-weight:600">${esc(r.title)}</span>
              <span class="badge badge-pending">PENDING</span>
            </div>
            <div style="font-size:10px;color:var(--text-2)">By: ${esc(r.requesterName)} · ${r.category}</div>
            <button class="btn btn-accent btn-sm" style="margin-top:6px" onclick="showPanel('requests')">View Request</button>
          </div>`).join('') : logs.map(l=>logRow(l)).join('')}
      </div>
    </div>`;
}

function statCard(icon,val,label,cls){
  return `<div class="stat-card ${cls}"><div class="stat-icon">${icon}</div><div class="stat-value">${val}</div><div class="stat-label">${label}</div></div>`;
}
function logRow(l){
  const c=l.action.includes('DELETE')?'var(--red)':l.action.includes('CREATE')?'var(--green)':l.action.includes('LOGIN')?'var(--accent)':l.action.includes('CHANGE')?'var(--amber)':'var(--text-3)';
  return `<div class="log-row"><div class="log-dot" style="background:${c}"></div><div class="log-time">${(l.timestamp||'').slice(0,16).replace('T',' ')}</div><div class="log-who">${l.userName}</div><div class="log-action" style="color:${c}">${l.action.replace(/_/g,' ')}</div></div>`;
}

let _userSearch='';
function renderUsers(){
  const perms=DB.getPerms(SESSION.role);
  const canAdd=perms.includes('add_users')||perms.includes('manage_users');
  const canDel=perms.includes('delete_all');
  const canEdit=perms.includes('edit_all')||perms.includes('manage_users');
  const el=document.getElementById('panel-users');
  el.innerHTML=`
    <div class="page-header">
      <div><div class="page-title">User Management</div><div class="page-sub">Manage accounts, roles and access</div></div>
      <div class="header-actions">
        ${canAdd?`<button class="btn btn-green" onclick="openAddUserModal()">＋ Add User</button>`:''}
        <button class="btn btn-ghost" onclick="renderUsers()">⟳ Refresh</button>
      </div>
    </div>
    <div class="card">
      <div class="search-bar"><input class="search-input" id="userSearch" placeholder="Search name, username, role…" value="${_userSearch}" oninput="_userSearch=this.value;renderUserTable()"></div>
      <div class="table-wrap"><table>
        <thead><tr><th>User</th><th>Username</th><th>Role</th><th>Phone</th><th>WhatsApp</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody id="userTableBody"></tbody>
      </table></div>
    </div>`;
  renderUserTable(canEdit,canDel);
}

function renderUserTable(canEdit,canDel){
  if(canEdit===undefined){ const p=DB.getPerms(SESSION.role); canEdit=p.includes('edit_all')||p.includes('manage_users'); canDel=p.includes('delete_all'); }
  const viewAll=DB.getPerms(SESSION.role).includes('view_all');
  let users=viewAll?DB.getUsers():DB.getUsers().filter(u=>u.createdBy===SESSION.id||u.id===SESSION.id);
  const q=(_userSearch||'').toLowerCase();
  if(q) users=users.filter(u=>u.fullName.toLowerCase().includes(q)||u.username.toLowerCase().includes(q)||u.role.includes(q));
  const tbody=document.getElementById('userTableBody');
  if(!tbody) return;
  if(!users.length){ tbody.innerHTML=`<tr><td colspan="8" style="text-align:center;color:var(--text-3);padding:40px">No users found</td></tr>`; return; }
  tbody.innerHTML=users.map(u=>`
    <tr>
      <td><div style="display:flex;align-items:center;gap:10px"><div class="avatar" style="background:${DB.getRoleColor(u.role)};width:32px;height:32px;font-size:11px">${initials(u.fullName)}</div><div style="font-size:12px;font-weight:600">${esc(u.fullName)}</div></div></td>
      <td class="td-muted td-mono">@${esc(u.username)}</td>
      <td><span class="role-badge" style="background:${DB.getRoleColor(u.role)};font-size:10px;padding:2px 7px">${u.role.toUpperCase()}</span></td>
      <td class="td-muted">${esc(u.phone)||'—'}</td>
      <td class="td-muted">${esc(u.whatsapp)||'—'}</td>
      <td><span class="badge ${u.isActive?'badge-active':'badge-inactive'}">${u.isActive?'ACTIVE':'INACTIVE'}</span></td>
      <td class="td-muted">${(u.createdAt||'').slice(0,10)}</td>
      <td><div class="action-cell">
        ${canEdit&&u.id!=='admin_1'?`<button class="btn btn-ghost btn-sm btn-icon" title="Change Role" onclick="openChangeRoleModal('${u.id}')">↑</button><button class="btn btn-ghost btn-sm btn-icon" title="${u.isActive?'Deactivate':'Activate'}" onclick="doToggleActive('${u.id}')">${u.isActive?'⊘':'⊙'}</button>`:''}
        ${canDel&&u.role!=='admin'&&u.id!==SESSION.id?`<button class="btn btn-red btn-sm btn-icon" title="Delete" onclick="confirmDeleteUser('${u.id}','${esc(u.fullName)}')">✕</button>`:''}
        ${u.whatsapp?`<button class="btn btn-ghost btn-sm" onclick="openWAChat('${u.whatsapp}')">📱</button>`:''}
      </div></td>
    </tr>`).join('');
}

function doToggleActive(uid){ const u=DB.getUserById(uid); if(!u) return; if(uid===SESSION.id){toast('Cannot deactivate yourself','error');return;} DB.toggleActive(uid,SESSION.id); toast(`${u.fullName} ${u.isActive?'deactivated':'activated'}`,u.isActive?'warn':'success'); renderUserTable(); }
function confirmDeleteUser(uid,name){ openConfirm(`Delete user <strong>${name}</strong>?`,'This cannot be undone.',()=>{ DB.deleteUser(uid,SESSION.id); toast(`${name} deleted`,'error'); renderUserTable(); }); }

function renderInviteTable(viewAll){
  const invites=viewAll?DB.getInvites():DB.getInvites(SESSION.id);
  const tbody=document.getElementById('inviteTableBody');
  if(!tbody) return;
  if(!invites.length){ tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;color:var(--text-3);padding:40px">No invites yet. Generate your first invite!</td></tr>`; return; }
  tbody.innerHTML=invites.map(i=>`
    <tr>
      <td><div class="token-box" onclick="copyToken('${i.token}',this)" style="margin:0;padding:6px 10px;font-size:11px">${i.token.slice(0,28)}…<span class="copy-hint">Click to copy full token</span></div></td>
      <td><span class="role-badge" style="background:${DB.getRoleColor(i.role)};font-size:10px;padding:2px 7px">${i.role.toUpperCase()}</span></td>
      <td><span class="badge ${i.used?'badge-used':'badge-fresh'}">${i.used?'USED':'ACTIVE'}</span></td>
      <td class="td-muted">${esc(i.creatorName)}</td>
      <td class="td-muted">${(i.createdAt||'').slice(0,10)}</td>
      <td><div class="action-cell">
        ${!i.used?`<button class="btn btn-accent btn-sm" onclick="openSendInviteModal('${i.token}','${i.role}')">📱 Send</button>`:''}
        <button class="btn btn-ghost btn-sm" onclick="copyToken('${i.token}',this)">⧉ Copy</button>
        ${viewAll?`<button class="btn btn-red btn-sm btn-icon" onclick="doDeleteInvite('${i.id}')">✕</button>`:''}
      </div></td>
    </tr>`).join('');
}

function copyToken(token,el){ navigator.clipboard.writeText(token).then(()=>toast('Token copied!','success')); }
function doDeleteInvite(id){ DB.deleteInvite(id); toast('Token deleted','warn'); renderInviteTable(true); }

let _reqFilter='all';
function renderRequests(){
  const perms=DB.getPerms(SESSION.role);
  const canCreate=perms.includes('create_requests');
  const canFulfill=perms.includes('fulfill_requests');
  const el=document.getElementById('panel-requests');
  el.innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Request Management</div><div class="page-sub">Submit, track and fulfill work requests</div></div>
      <div class="header-actions">
        ${canCreate?`<button class="btn btn-accent" onclick="openNewRequestModal()">＋ New Request</button>`:''}
        <button class="btn btn-ghost" onclick="renderRequests()">⟳ Refresh</button>
      </div>
    </div>
    <div class="req-tabs">
      ${canFulfill?`<button class="req-tab ${_reqFilter==='all'?'active':''}" onclick="_reqFilter='all';renderRequests()">All Requests</button>`:''}
      ${canFulfill?`<button class="req-tab ${_reqFilter==='pending'?'active':''}" onclick="_reqFilter='pending';renderRequests()">Pending</button>`:''}
      <button class="req-tab ${_reqFilter==='mine'?'active':''}" onclick="_reqFilter='mine';renderRequests()">My Requests</button>
    </div>
    <div id="requests-list"></div>`;
  renderRequestsList(canFulfill);
}

function renderRequestsList(canFulfill){
  let reqs;
  if(_reqFilter==='mine') reqs=DB.getRequests('own');
  else if(_reqFilter==='pending') reqs=DB.getRequests('pending');
  else reqs=DB.getRequests();

  const container=document.getElementById('requests-list');
  if(!container) return;
  if(!reqs.length){ container.innerHTML=`<div class="empty-state"><div class="empty-icon">◫</div><p>No requests found. ${DB.getPerms(SESSION.role).includes('create_requests')?'Click "+ New Request" to create one.':''}</p></div>`; return; }

  container.innerHTML=reqs.map(r=>{
    const statusCls=r.status==='pending'?'badge-pending':r.status==='fulfilled'?'badge-fulfilled':'badge-rejected';
    const priColor=r.priority==='high'?'var(--red)':r.priority==='urgent'?'var(--amber)':'var(--text-3)';
    const canAct=canFulfill&&r.status==='pending';
    return `<div class="req-card">
      <div class="req-card-header">
        <div>
          <div class="req-title">${esc(r.title)}</div>
          <div class="req-meta">By: ${esc(r.requesterName)} · ${esc(r.category)} · <span style="color:${priColor}">${r.priority.toUpperCase()}</span> · ${(r.createdAt||'').slice(0,10)}</div>
        </div>
        <span class="badge ${statusCls}">${r.status.toUpperCase()}</span>
      </div>
      <div class="req-body">${esc(r.description)}</div>
      ${r.response?`<div class="req-response"><strong style="color:var(--accent)">Response by ${esc(r.fulfillerName||'—')}:</strong> ${esc(r.response)}</div>`:''}
      ${canAct?`<div class="req-actions">
        <button class="btn btn-green btn-sm" onclick="openFulfillModal('${r.id}','fulfill')">✓ Fulfill</button>
        <button class="btn btn-red btn-sm" onclick="openFulfillModal('${r.id}','reject')">✕ Reject</button>
      </div>`:''}
    </div>`;
  }).join('');
}

function openNewRequestModal(){
  document.getElementById('modal-req-title').textContent='＋ New Request';
  document.getElementById('modal-request-body').innerHTML=`
    <div id="req-err" class="error-msg"></div>
    <div class="field"><label>Title *</label><input id="req-title" placeholder="Brief summary of your request"></div>
    <div class="field-row">
      <div class="field"><label>Category</label>
        <select id="req-category"><option value="general">General</option><option value="it">IT / Tech</option><option value="hr">HR</option><option value="finance">Finance</option><option value="operations">Operations</option><option value="other">Other</option></select>
      </div>
      <div class="field"><label>Priority</label>
        <select id="req-priority"><option value="normal">Normal</option><option value="high">High</option><option value="urgent">Urgent</option></select>
      </div>
    </div>
    <div class="field"><label>Description *</label><textarea id="req-desc" rows="5" placeholder="Describe your request in detail…"></textarea></div>`;
  document.getElementById('modal-req-footer').innerHTML=`
    <button class="btn btn-ghost" onclick="closeModal('modal-request')">Cancel</button>
    <button class="btn btn-accent" onclick="submitNewRequest()">Submit Request</button>`;
  openModal('modal-request');
}

function submitNewRequest(){
  const title=document.getElementById('req-title')?.value?.trim();
  const desc=document.getElementById('req-desc')?.value?.trim();
  const cat=document.getElementById('req-category')?.value;
  const pri=document.getElementById('req-priority')?.value;
  const err=document.getElementById('req-err');
  err.classList.remove('show');
  if(!title||!desc){ err.textContent='Title and description required'; err.classList.add('show'); return; }
  DB.createRequest({title,description:desc,category:cat,priority:pri},SESSION.id);
  toast('Request submitted successfully!','success');
  closeModal('modal-request');
  buildSidebar();
  renderRequests();
}

function openFulfillModal(reqId,action){
  const label=action==='fulfill'?'Fulfill':'Reject';
  document.getElementById('modal-req-title').textContent=`${action==='fulfill'?'✓':'✕'} ${label} Request`;
  document.getElementById('modal-request-body').innerHTML=`
    <div class="field"><label>${label} Response / Notes</label><textarea id="fulfill-resp" rows="4" placeholder="Add your response or notes…"></textarea></div>`;
  document.getElementById('modal-req-footer').innerHTML=`
    <button class="btn btn-ghost" onclick="closeModal('modal-request')">Cancel</button>
    <button class="btn btn-${action==='fulfill'?'green':'red'}" onclick="submitFulfill('${reqId}','${action}')">${label}</button>`;
  openModal('modal-request');
}

function submitFulfill(reqId,action){
  const resp=document.getElementById('fulfill-resp')?.value?.trim()||'';
  DB.fulfillRequest(reqId,resp,action==='fulfill'?'fulfilled':'rejected',SESSION.id);
  toast(`Request ${action==='fulfill'?'fulfilled':'rejected'}`,action==='fulfill'?'success':'warn');
  closeModal('modal-request');
  buildSidebar();
  renderRequests();
}

// ═══════════════════════════════════════════════════════════════
let _activeSheetId=null;
let _sheets={}; // id -> {name, tabs: [{name, data:[[...]]}]}
let _activeTab=0;
let _sheetListOpen=true;

function renderSpreadsheet(){
  const userSheets=DB.getSpreadsheets(SESSION.id);
  const el=document.getElementById('panel-spreadsheet');
  el.innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Spreadsheet Builder</div><div class="page-sub">Create and manage work spreadsheets</div></div>
      <div class="header-actions">
        <button class="btn btn-teal" onclick="newSpreadsheet()">＋ New Spreadsheet</button>
        ${_activeSheetId?`<button class="btn btn-green" onclick="saveCurrentSheet()">⊙ Save</button><button class="btn btn-ghost" onclick="exportCSV()">↓ Export CSV</button>`:''}
        <button class="btn btn-ghost" onclick="renderSpreadsheet()">⟳ Refresh</button>
      </div>
    </div>
    <div class="two-col" style="gap:14px;align-items:flex-start">
      <div class="card" style="min-width:0">
        <div class="card-title">Saved Spreadsheets</div>
        <div class="card-sub">${userSheets.length} spreadsheet(s)</div>
        ${userSheets.length===0?`<div class="empty-state" style="padding:30px 0"><div class="empty-icon">⊟</div><p>No spreadsheets yet</p></div>`:
          userSheets.map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="flex:1"><div style="font-size:12px;font-weight:600;color:${_activeSheetId===s.id?'var(--teal)':'var(--text-1)'}">${esc(s.name)}</div>
              <div style="font-size:10px;color:var(--text-3)">${(s.updatedAt||s.createdAt||'').slice(0,10)} · ${s.tabs?.length||1} tab(s)</div></div>
            <button class="btn btn-teal btn-sm" onclick="loadSheet('${s.id}')">Open</button>
            <button class="btn btn-red btn-sm btn-icon" onclick="deleteSheet('${s.id}')">✕</button>
          </div>`).join('')}
      </div>
      <div style="min-width:0;flex:1" id="sheet-editor-wrap">
        ${_activeSheetId?buildSheetEditor():`<div class="card empty-state" style="padding:60px 20px"><div class="empty-icon">⊟</div><p>Open or create a spreadsheet to start editing</p></div>`}
      </div>
    </div>`;
}

function buildSheetEditor(){
  const sheet=_sheets[_activeSheetId];
  if(!sheet) return '';
  const tab=sheet.tabs[_activeTab]||sheet.tabs[0];
  if(!tab) return '';
  const rows=tab.data||[];
  const numCols=Math.max(8,...rows.map(r=>r.length));
  const numRows=Math.max(20,rows.length+2);
  const colLetters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  let html=`
    <div class="sheet-toolbar">
      <input class="sheet-name-input" id="sheet-name-inp" value="${esc(sheet.name)}" onchange="sheet.name=this.value" title="Sheet name">
      <div class="sheet-sep"></div>
      <button class="btn btn-teal btn-sm" onclick="saveCurrentSheet()">⊙ Save</button>
      <button class="btn btn-ghost btn-sm" onclick="addSheetRow()">＋ Row</button>
      <button class="btn btn-ghost btn-sm" onclick="addSheetCol()">＋ Col</button>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">↓ CSV</button>
    </div>
    <div class="sheet-wrap" id="sheet-wrap">
      <table class="sheet-table">
        <thead><tr>
          <th class="row-num" style="background:var(--bg-2);border:1px solid var(--border)"></th>
          ${Array.from({length:numCols},(_,i)=>`<th class="col-header">${colLetters[i]||i}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${Array.from({length:numRows},(_,r)=>`
            <tr>
              <td class="row-num">${r+1}</td>
              ${Array.from({length:numCols},(_,c)=>{
                const val=(rows[r]&&rows[r][c]!==undefined)?rows[r][c]:'';
                const isFormula=String(val).startsWith('=');
                return `<td class="cell"><input type="text" value="${esc(String(val))}" class="${isFormula?'formula':''}" data-r="${r}" data-c="${c}" onchange="setCellVal(${r},${c},this.value)" oninput="if(this.value.startsWith('=')){this.classList.add('formula')}else{this.classList.remove('formula')}" onkeydown="handleCellKey(event,${r},${c},${numRows},${numCols})"></td>`;
              }).join('')}
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="sheets-list-outer">
      <div class="sheets-list" id="sheet-tabs-list">
        ${sheet.tabs.map((t,i)=>`<button class="sheet-tab-btn ${i===_activeTab?'active':''}" onclick="switchTab2(${i})">${esc(t.name)}</button>`).join('')}
        <button class="sheet-add-tab" onclick="addSheetTab()" title="Add tab">＋</button>
      </div>
    </div>`;
  return html;
}

function newSpreadsheet(){

function setCellVal(r,c,val){
  const sheet=_sheets[_activeSheetId]; if(!sheet) return;
  const tab=sheet.tabs[_activeTab]; if(!tab) return;
  if(!tab.data[r]) tab.data[r]=[];
  if(val.startsWith('=')){
    try{ tab.data[r][c]=evalFormula(val,tab.data); }
    catch{ tab.data[r][c]=val; }
  } else {
    tab.data[r][c]=isNaN(val)||val===''?val:Number(val);
  }
}

function evalFormula(expr,data){
  // Basic SUM/AVERAGE/COUNT
  const up=expr.toUpperCase();
  const cellRef=(ref)=>{ const m=ref.match(/([A-Z]+)(\d+)/); if(!m) return 0; const c='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.indexOf(m[1]); const r=parseInt(m[2])-1; return Number((data[r]&&data[r][c])||0); };
  const rangeVals=(range)=>{ const m=range.match(/([A-Z]+)(\d+):([A-Z]+)(\d+)/); if(!m) return []; const c1='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.indexOf(m[1]),r1=parseInt(m[2])-1,c2='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.indexOf(m[3]),r2=parseInt(m[4])-1; const vals=[]; for(let r=r1;r<=r2;r++) for(let c=c1;c<=c2;c++) vals.push(Number((data[r]&&data[r][c])||0)); return vals; };
  if(up.startsWith('=SUM(')){ const r=expr.slice(5,-1); const vals=rangeVals(r.toUpperCase()); return vals.reduce((a,b)=>a+b,0); }
  if(up.startsWith('=AVERAGE(')){ const r=expr.slice(9,-1); const vals=rangeVals(r.toUpperCase()); return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0; }
  if(up.startsWith('=COUNT(')){ const r=expr.slice(7,-1); return rangeVals(r.toUpperCase()).filter(v=>v!==0).length; }
  if(up.startsWith('=MAX(')){ const r=expr.slice(5,-1); const v=rangeVals(r.toUpperCase()); return v.length?Math.max(...v):0; }
  if(up.startsWith('=MIN(')){ const r=expr.slice(5,-1); const v=rangeVals(r.toUpperCase()); return v.length?Math.min(...v):0; }
  return expr;
}

function handleCellKey(e,r,c,maxR,maxC){
  if(e.key==='Enter'||e.key==='ArrowDown'){ e.preventDefault(); focusCell(r+1,c); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); focusCell(r-1,c); }
  else if(e.key==='Tab'){ e.preventDefault(); focusCell(r,c+1); }
  else if(e.key==='ArrowRight'&&e.target.selectionEnd===e.target.value.length){ focusCell(r,c+1); }
  else if(e.key==='ArrowLeft'&&e.target.selectionStart===0){ focusCell(r,c-1); }
}

function focusCell(r,c){
  const inp=document.querySelector(`input[data-r="${r}"][data-c="${c}"]`);
  if(inp) inp.focus();
}

function exportCSV(){
  const sheet=_sheets[_activeSheetId]; if(!sheet) return;
  const tab=sheet.tabs[_activeTab]; if(!tab) return;
  const csv=tab.data.map(row=>row.map(cell=>`"${String(cell||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`${sheet.name}_${tab.name}.csv`; a.click();
  toast('CSV exported!','success');
}

  const isAdmin=SESSION.role==='admin';
  const canAdmin=perms.includes('manage_roles');
  const roles=canAdmin?['viewer','employee','sysadmin','supervisor','manager','admin']:['viewer','employee','supervisor'];
  document.getElementById('modal-gen-invite-body').innerHTML=`
    <div class="field">
      <label>Role for Invitee</label>
      <select id="gi-role">${roles.map(r=>`<option value="${r}">${r.toUpperCase()}</option>`).join('')}</select>
    </div>
    ${isAdmin?`<div class="field">
      <label>Number of Tokens (Admin: Unlimited)</label>
      <input type="number" id="gi-count" value="1" min="1" max="500" placeholder="1 to 500">
      <div class="hint">As admin you can generate up to 500 tokens at once, with no lifetime limit.</div>
    </div>
    <div style="padding:10px 14px;background:rgba(199,125,255,.06);border:1px solid rgba(199,125,255,.2);margin-bottom:14px;font-size:11px;color:var(--purple)">∞ Admin privilege: unlimited token generation</div>`:
    `<div style="padding:10px 14px;background:rgba(0,255,178,.04);border:1px solid rgba(0,255,178,.15);margin-bottom:14px;font-size:11px;color:var(--text-2)">ℹ Single token generated per action.</div>`}
    <div id="gi-result" style="display:none">
      <div style="font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:8px">Generated Token(s):</div>
      <div id="gi-token-list"></div>
      <button class="btn btn-accent btn-sm" onclick="copyAllTokens()">⧉ Copy All Tokens</button>
    </div>`;
  openModal('modal-gen-invite');
}

function submitGenInvite(){
  const role=document.getElementById('gi-role').value;
  const countEl=document.getElementById('gi-count');
  const count=countEl?Math.min(500,Math.max(1,parseInt(countEl.value)||1)):1;
  _genTokens=DB.generateInvite(role,SESSION.id,count);
  const result=document.getElementById('gi-result');
  const list=document.getElementById('gi-token-list');
  result.style.display='block';
  if(count===1){
    list.innerHTML=`<div class="token-box" onclick="copyToken('${_genTokens[0]}',this)">${_genTokens[0]}<span class="copy-hint">Click to copy</span></div>`;
  } else {
    list.innerHTML=`<div class="bulk-token-list">${_genTokens.map((t,i)=>`<div class="bulk-token-item"><span style="color:var(--text-3);font-size:10px;min-width:24px">${i+1}.</span><span class="bulk-token-val">${t}</span><span class="bulk-token-role">${role.toUpperCase()}</span><button class="btn btn-ghost btn-sm" onclick="copyToken('${t}',this)">⧉</button></div>`).join('')}</div>`;
  }
  toast(`${count} token(s) generated for ${role.toUpperCase()}`,'success');
  renderInviteTable(DB.getPerms(SESSION.role).includes('view_all'));
}

function copyAllTokens(){ navigator.clipboard.writeText(_genTokens.join('\n')).then(()=>toast(`${_genTokens.length} token(s) copied!`,'success')); }

function openSendInviteModal(token,role){
  document.getElementById('modal-send-invite-body').innerHTML=`
    <div style="margin-bottom:16px;padding:12px;background:rgba(0,255,178,.05);border:1px solid rgba(0,255,178,.2)">
      <div style="font-size:10px;color:var(--text-2);margin-bottom:4px">TOKEN TO SEND</div>
      <div style="font-size:12px;color:var(--accent);word-break:break-all">${token}</div>
      <div style="font-size:10px;color:var(--text-2);margin-top:4px">Role: <strong style="color:${DB.getRoleColor(role)}">${role.toUpperCase()}</strong></div>
    </div>
    <div class="field"><label>Recipient Phone (international, no +)</label><input id="si-phone" placeholder="233244000000"></div>
    <div class="field"><label>Your Name (shown in message)</label><input id="si-name" value="${SESSION.fullName}" placeholder="${SESSION.fullName}"></div>`;
  document.getElementById('modal-send-invite').dataset.token=token;
  document.getElementById('modal-send-invite').dataset.role=role;
  openModal('modal-send-invite');
}

function submitSendInvite(){
  const phone=document.getElementById('si-phone')?.value?.trim();
  const name=document.getElementById('si-name')?.value?.trim()||SESSION.fullName;
  const token=document.getElementById('modal-send-invite').dataset.token;
  const role=document.getElementById('modal-send-invite').dataset.role;
  if(!phone){toast('Enter phone number','error');return;}
  const msg=`Hello! 👋\n\n*${name}* has invited you to join our Management System.\n\n🔑 Role: *${role.toUpperCase()}*\n🎟️ Invite Token:\n\`${token}\`\n\nUse this token on the Register tab to create your account.\n\n_Single-use — keep it confidential._`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
  DB.saveMessage(SESSION.id,phone,`INVITE sent: role=${role}`);
  toast('WhatsApp opening…','info');
  closeModal('modal-send-invite');
}

let _confirmCb=null;
function openConfirm(msg,warn,cb){ _confirmCb=cb; document.getElementById('confirm-msg').innerHTML=msg; document.getElementById('confirm-warn').textContent=warn||''; openModal('modal-confirm'); }
function submitConfirm(){ closeModal('modal-confirm'); if(_confirmCb) _confirmCb(); _confirmCb=null; }

// ═══════════════════════════════════════════════════════════════
// LOGIN / REGISTER / LOGOUT
// ═══════════════════════════════════════════════════════════════
function bindLoginEvents(){
  document.getElementById('btn-login').addEventListener('click',doLogin);
  document.getElementById('btn-register').addEventListener('click',doRegister);
  ['login-username','login-password'].forEach(id=>{ document.getElementById(id)?.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); }); });
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.dataset.tab===tab));
}

function doLogin(){
  const username=document.getElementById('login-username').value.trim();
  const password=document.getElementById('login-password').value;
  const errEl=document.getElementById('login-error');
  errEl.classList.remove('show');
  if(!username||!password){errEl.textContent='Enter username and password';errEl.classList.add('show');return;}
  const result=DB.login(username,password);
  if(!result){errEl.textContent='Invalid username or password';errEl.classList.add('show');return;}
  if(result.error==='disabled'){errEl.textContent='Account disabled. Contact admin.';errEl.classList.add('show');return;}
  setSession(result); bootApp();
}

function doRegister(){
  const token=document.getElementById('reg-token').value.trim();
  const uname=document.getElementById('reg-username').value.trim();
  const fname=document.getElementById('reg-fullname').value.trim();
  const phone=document.getElementById('reg-phone').value.trim();
  const wa=document.getElementById('reg-wa').value.trim();
  const pwd=document.getElementById('reg-pwd').value;
  const errEl=document.getElementById('reg-error');
  errEl.classList.remove('show');
  const show=(m)=>{errEl.textContent=m;errEl.classList.add('show');};
  if(!token){show('Invite token required');return;}
  if(!uname){show('Username required');return;}
  if(!fname){show('Full name required');return;}
  if(!pwd||pwd.length<6){show('Password min 6 characters');return;}
  const user=DB.useInvite(token,{username:uname,fullName:fname,phone,whatsapp:wa,password:pwd});
  if(!user){show('Invalid/used token, or username taken');return;}
  toast(`Account created! Role: ${user.role.toUpperCase()}. Please log in.`,'success',5000);
  switchTab('login');
  document.getElementById('login-username').value=uname;
}

function doLogout(){
  if(!confirm('Log out?')) return;
  DB.log(SESSION.id,'LOGOUT',SESSION.fullName);
  clearSession(); SESSION=null;
  showScreen('screen-login');
  document.getElementById('login-username').value='';
  document.getElementById('login-password').value='';
}

// HELPERS
// ═══════════════════════════════════════════════════════════════
function initials(name){ return (name||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?'; }
function esc(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
